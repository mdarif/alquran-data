# Al Quran — data pipeline config (REAL SOURCES, QUL)
#
# Raw QUL files were downloaded into ./sources/ (git-ignored). Because QUL ships
# the data in several shapes, run the preprocessing step first, then build:
#
#   python pipeline/prepare_sources.py            # -> arabic-ayah.sqlite, structure.sqlite
#   python pipeline/build_db.py --config config/sources.yaml
#   python pipeline/verify_db.py --db assets/quran.db
#
# Licenses below are PLACEHOLDERS — verify each resource's license on its QUL
# page before any public release (PRD Risk: translation/font licensing).

output: assets/quran.db
db_version: "1.0.0"
schema_version: "1"

sources:
  # --- Surah metadata: 114 rows (QUL "Surah names", chapters table) -------
  surahs:
    file: sources/quran-metadata-surah-name.sqlite

  # --- Arabic Uthmani: github.com/quran's golden text, ingested VERBATIM ----
  # `quran.ar.uthmani.v2.db` is the exact QPC Hafs Uthmani text the quran.com /
  # quran-ios apps ship (quran/quran-ios → Domain/QuranResources/Databases).
  # It is co-designed with the KFGQPC font (UthmanicHafs1B Ver13) and renders
  # madd/tanween/sukun correctly with NO tatweel-grafting and NO mark-stripping
  # — so we read it as-is. Bismillah is already a separate header (not bundled
  # in each surah's ayah 1) and the text carries no trailing ayah-number glyph.
  arabic_uthmani:
    file: sources/quran.ar.uthmani.v2.db
    table: arabic_text
    columns:
      surah: sura
      ayah: ayah
      text: text

  # --- Structural navigation indices: derived per-ayah ---------------------
  # Produced by prepare_sources.py: page (QPC V2 604-page layout), juz, hizb,
  # rub-al-hizb, ruku (QUL marker tables), and sajda (QUL sajdah list).
  metadata:
    file: sources/structure.sqlite
    mode: per_ayah

  # --- Translations (MVP: Urdu only) ---------------------------------------
  # Licensing decision (2026-06-20): the app ships as a FREE, NON-COMMERCIAL
  # / da'wah product. Under that distribution model the Urdu (Junagarhi)
  # translation is cleared for use with attribution (see ATTRIBUTION.md).
  # Hindi + other languages are DEFERRED from the MVP and re-enabled later
  # once their attribution is wired in (the Hindi al-Umari source via
  # QuranEnc.com is already permissive — see commented block + ATTRIBUTION.md).
  translations:
    - file: sources/ur-junagarri-simple.db
      language_code: ur
      name: "Maulana Muhammad Junagarhi"
      author: "Muhammad Junagarhi"
      # CLEARED for free / non-commercial (da'wah) distribution with attribution.
      # Source lineage: Tanzil Project (ur.junagarhi). Tanzil translation terms
      # permit non-commercial use with attribution (https://tanzil.net/trans/).
      # Underlying translation likely public domain (translator d. 1941).
      # OBLIGATION: ship verbatim (no edits); credit translator + Tanzil Project
      # with a link to tanzil.net (see ATTRIBUTION.md).
      # CAVEAT: monetizing the app later requires re-clearing (translator/publisher
      # permission) — Tanzil's translation terms are non-commercial only.
      license: "Free/non-commercial use with attribution (Tanzil terms); verbatim only. See ATTRIBUTION.md"
      source_url: "https://qul.tarteel.ai/resources/translation/305"

    # --- English: Dr. Hilali & Dr. Muhsin Khan ("The Noble Quran") ----------
    # Salafi / Ahle Hadith translation, published by King Fahd Complex.
    # DOWNLOAD: qul.tarteel.ai/resources/translation/301 (requires QUL login)
    #   → save as sources/en-hilali-khan-simple.db, then rebuild.
    # Licensing: freely distributed for Islamic/da'wah purposes by King Fahd
    # Complex. Verify exact redistribution terms on the QUL resource page before
    # release. Attribution: "Dr. Muhammad Taqi-ud-Din Al-Hilali and
    # Dr. Muhammad Muhsin Khan, King Fahd Complex for the Printing of the
    # Holy Quran, Madinah."
    - file: sources/en-hilali-khan-simple.db
      language_code: en
      name: "The Noble Quran (Hilali & Khan)"
      author: "Dr. Muhammad Taqi-ud-Din Al-Hilali and Dr. Muhammad Muhsin Khan"
      license: "Freely distributed for da'wah/Islamic purposes; King Fahd Complex. Verify QUL resource page before release."
      source_url: "https://qul.tarteel.ai/resources/translation/301"

    # --- DEFERRED: Hindi (Azizul Haque al-Umari) — replaced by English ------
    # - file: sources/maulana-azizul-haque-al-umari-simple.db
    #   language_code: hi
    #   name: "Maulana Azizul Haque al-Umari"
    #   author: "Azizul Haque al-Umari"
    #   license: "QuranEnc.com terms — unmodified + attribution + version no. See ATTRIBUTION.md"
    #   source_url: "https://qul.tarteel.ai/resources/translation/166"
